<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Modifier Profil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="floating">Nom d'utilisateur</ion-label>
    <ion-input [(ngModel)]="user.nom_utilisateur"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="floating">Email</ion-label>
    <ion-input [(ngModel)]="user.email" type="email"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="floating">Ville</ion-label>
    <ion-input [(ngModel)]="user.ville"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="floating">Biographie</ion-label>
    <ion-textarea [(ngModel)]="user.biographie"></ion-textarea>
  </ion-item>
  <ion-button expand="block" (click)="modifier()">Enregistrer</ion-button>
</ion-content>
